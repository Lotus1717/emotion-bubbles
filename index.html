<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="念起 - 念起即觉，觉已不随。戳破情绪的泡影，让念头自然流过。">
    <meta name="theme-color" content="#0a0a1a">
    <title>念起 - 念起即觉，觉已不随</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="念起">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- 背景效果 -->
    <div class="stars" id="stars"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- 主容器 -->
    <div class="container">

        <!-- 开始面板 -->
        <div class="start-panel" id="startPanel">
            <!-- 标题区 -->
            <div class="start-header">
                <h1 class="title">念起</h1>
                <p class="subtitle">念起即觉，觉已不随</p>
            </div>
            
            <!-- 设置区 -->
            <div class="start-settings">
                <!-- 主题选择 -->
                <div class="setting-group">
                    <div class="setting-label">主题</div>
                    <div class="theme-options">
                        <div class="theme-btn healing active" data-theme="healing" title="治愈系"></div>
                        <div class="theme-btn forest" data-theme="forest" title="森林"></div>
                        <div class="theme-btn sunset" data-theme="sunset" title="日落"></div>
                    </div>
                </div>
                
                <!-- 时间选择 -->
                <div class="setting-group">
                    <div class="setting-label">时长</div>
                    <div class="time-options">
                        <button class="time-btn active" data-time="60">1分钟</button>
                        <button class="time-btn" data-time="180">3分钟</button>
                    </div>
                </div>
            </div>
            
            <!-- 主按钮 -->
            <button class="btn btn-primary btn-large" id="startBtn">开始</button>
            
            <!-- 辅助按钮 -->
            <div class="start-actions">
                <button class="btn-text" id="statsBtn">查看历史</button>
                <button class="btn-text" id="reminderToggleBtn">每日提醒</button>
            </div>
        </div>

        <!-- 提醒设置模态框 -->
        <div class="reminder-modal" id="reminderPanel">
            <div class="reminder-modal-content">
                <button class="reminder-close-btn" id="closeReminderBtn">✕</button>
                <h3 class="reminder-modal-title">每日提醒</h3>
                <p class="reminder-modal-desc">设置一个固定时间<br>提醒自己觉察情绪</p>
                
                <div class="reminder-settings">
                    <div class="reminder-row">
                        <span class="reminder-label">开启提醒</span>
                        <label class="switch reminder-toggle">
                            <input type="checkbox" id="reminderToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    
                    <div class="reminder-time-wrapper" id="reminderTimeWrapper">
                        <span class="reminder-label">提醒时间</span>
                        <input type="time" id="reminderTime" class="reminder-time-input" value="21:00">
                    </div>
                </div>
            </div>
        </div>

        <!-- 游戏面板 -->
        <div class="play-panel" id="playPanel">
            <p class="hint-top">轻触泡影，让念头自然流过</p>
            <div class="bubble-container" id="bubbleContainer"></div>
            <div class="play-footer">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="timer-display" id="timerDisplay">1:00</div>
            </div>
            <button class="btn-end-early" id="endEarlyBtn">结束</button>
        </div>

        <!-- 倒计时面板 -->
        <div class="countdown-panel" id="countdownPanel">
            <div class="countdown" id="countdownText">3</div>
        </div>

        <!-- 统计面板 -->
        <div class="stats-panel" id="statsPanel">
            <!-- 头部 -->
            <div class="stats-header">
                <h2 class="stats-title">情绪记录</h2>
                <button class="stats-close-btn" id="backBtn">✕</button>
            </div>
            
            <!-- 可滚动内容区 -->
            <div class="stats-content">
                <!-- 时间筛选 -->
                <div class="stats-filter">
                    <button class="filter-btn active" data-range="week">本周</button>
                    <button class="filter-btn" data-range="month">本月</button>
                    <button class="filter-btn" data-range="all">全部</button>
                </div>
                
                <!-- 概览统计 -->
                <div class="stats-overview" id="statsOverview">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotalPopped">0</div>
                        <div class="stat-label">戳破总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statTotalDays">0</div>
                        <div class="stat-label">练习天数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statAvgPerDay">0</div>
                        <div class="stat-label">日均戳破</div>
                    </div>
                </div>
                
                <!-- 成就徽章 -->
                <div class="stats-achievements" id="statsAchievements">
                    <h3 class="stats-section-title">成就徽章</h3>
                    <div class="achievements-summary" id="achievementsSummary">
                        <span class="achievements-count">已解锁 <strong id="unlockedCount">0</strong>/<span id="totalCount">0</span></span>
                    </div>
                    <div class="achievements-grid" id="achievementsGrid"></div>
                    <div class="achievement-next" id="achievementNext"></div>
                </div>
                
                <!-- Top 情绪 -->
                <div class="stats-top" id="statsTop">
                    <h3 class="stats-section-title">高频情绪</h3>
                    <div class="top-list" id="topList"></div>
                </div>
                
                <!-- 分类统计 -->
                <div class="stats-category" id="statsCategory">
                    <h3 class="stats-section-title">情绪分类</h3>
                    <div class="category-list" id="categoryList"></div>
                </div>
            </div>
            
            <!-- 底部按钮 -->
            <div class="stats-footer">
                <button class="btn-text-danger" id="clearStatsBtn">清空历史</button>
            </div>
        </div>
    </div>

    <!-- 结果面板 -->
    <div class="result-panel" id="resultPanel">
        <h2 class="result-title">你戳破的情绪</h2>
        <p class="result-subtitle">这些都是你当下最真实的感受</p>
        <div class="emotion-tags" id="emotionTags"></div>
        <div class="ai-suggestion">
            <div class="ai-suggestion-title">✨ 小念的锦囊</div>
            <div class="ai-suggestion-text" id="aiSuggestion">
                谢谢你的信任。每一种情绪都值得被看见。记住，情绪没有好坏，它们只是你内心的信使。好好照顾自己。🌸
            </div>
        </div>
        <div class="result-buttons">
            <button class="btn btn-primary" id="restartBtn">再来一轮</button>
            <button class="btn btn-secondary" id="shareBtn">📤 分享</button>
            <button class="btn btn-secondary" id="closeResultBtn">关闭</button>
        </div>
    </div>

    <!-- 成就详情弹窗 -->
    <div class="achievement-detail" id="achievementDetail">
        <div class="achievement-detail-card">
            <div class="achievement-detail-icon" id="detailIcon">🏅</div>
            <div class="achievement-detail-name" id="detailName">成就名称</div>
            <div class="achievement-detail-desc" id="detailDesc">成就描述</div>
            <div class="achievement-detail-status" id="detailStatus">未解锁</div>
            <button class="achievement-detail-close" id="closeDetailBtn">关闭</button>
        </div>
    </div>

    <!-- 成就解锁通知 -->
    <div class="achievement-toast" id="achievementToast">
        <div class="achievement-toast-content">
            <div class="achievement-toast-icon" id="toastIcon">🏅</div>
            <div class="achievement-toast-text">
                <div class="achievement-toast-title">成就解锁！</div>
                <div class="achievement-toast-name" id="toastName"></div>
            </div>
        </div>
    </div>

    <!-- 加载 ES6 模块 -->
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/pwa.js"></script>
</body>

</html>
