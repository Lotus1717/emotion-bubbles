<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>情绪气泡 - 释放你的情绪</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0d1b2a 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 光晕 */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }

        .glow-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            left: -50px;
            animation: float 20s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
            font-weight: 300;
            letter-spacing: 0.3em;
        }

        /* 进度条 */
        .progress-container {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
            transition: width 1s linear;
            box-shadow: 0 0 10px var(--primary);
        }

        .timer-display {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .time-options {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }

        .time-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 80px;
        }

        .time-btn.active {
            background: rgba(102, 126, 234, 0.5);
            border-color: var(--primary);
            color: #fff;
        }

        .theme-options {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-btn.healing { background: linear-gradient(135deg, #667eea, #764ba2); }
        .theme-btn.cyber { background: linear-gradient(135deg, #00f5ff, #ff00ff); }
        .theme-btn.minimal { background: linear-gradient(135deg, #1a237e, #283593); }
        .theme-btn.forest { background: linear-gradient(135deg, #134E5E, #71B280); }
        .theme-btn.sunset { background: linear-gradient(135deg, #FF5122, #DD2476); }

        .theme-btn.active { border-color: #fff; transform: scale(1.1); }

        .bubble-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 120px);
            z-index: 10;
        }

        .bubble {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(2px);
            animation:
                bubbleFadeIn 1.2s ease-out forwards,
                floatInPlace 6s ease-in-out 1.2s infinite,
                bubblePulse 3s ease-in-out 1.2s infinite;
            opacity: 0;
        }

        /* 在原位漂浮动画 - 不离开视口 */
        @keyframes floatInPlace {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(15px, -10px) scale(1.03); }
            50% { transform: translate(-10px, -20px) scale(0.98); }
            75% { transform: translate(20px, -5px) scale(1.02); }
        }

        /* 气泡淡入 */
        @keyframes bubbleFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 气泡自然消失（未被戳破） */
        .bubble.fading {
            animation: bubbleFadeOut 3s ease-out forwards !important;
            pointer-events: none;
        }

        @keyframes bubbleFadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.6);
            }
        }

        /* 气泡完全出现后的稳定状态 */
        .bubble.visible {
            opacity: 1 !important;
        }

        @keyframes bubblePulse {
            0%, 100% {
                opacity: 0.85;
                box-shadow: 0 0 20px var(--bubble-color, rgba(102, 126, 234, 0.4)),
                            inset 0 0 15px rgba(255,255,255,0.3);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 35px var(--bubble-color, rgba(102, 126, 234, 0.6)),
                            inset 0 0 20px rgba(255,255,255,0.4);
            }
        }

        .bubble:hover {
            transform: scale(1.12) !important;
            animation-play-state: paused;
        }

        .bubble:active {
            transform: scale(0.85);
        }

        .bubble-text {
            color: #fff;
            font-size: 0.85rem;
            text-align: center;
            padding: 0.5rem;
            max-width: 80%;
            word-wrap: break-word;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            font-weight: 500;
            animation: textFloat 2s ease-in-out infinite;
        }

        @keyframes textFloat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .bubble.popping { animation: pop 0.4s ease-out forwards !important; }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.35); opacity: 0.8; }
            60% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.8s ease-out forwards;
            box-shadow: 0 0 6px currentColor;
        }

        @keyframes particleFade {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translate(var(--tx), var(--ty)) scale(0.6) rotate(180deg);
                opacity: 0.7;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg);
                opacity: 0;
            }
        }

        .result-panel, .stats-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .result-panel.show, .stats-panel.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-title { font-size: 1.8rem; color: #fff; margin-bottom: 0.5rem; }
        .result-subtitle { color: rgba(255, 255, 255, 0.6); margin-bottom: 1.5rem; font-size: 0.9rem; }

        .emotion-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            max-width: 500px;
            margin-bottom: 1.5rem;
        }

        .emotion-tag {
            padding: 0.4rem 0.8rem;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(236, 72, 153, 0.3));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: #fff;
            font-size: 0.85rem;
        }

        .ai-suggestion {
            max-width: 450px;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-suggestion-title { color: var(--primary); margin-bottom: 0.5rem; font-size: 0.85rem; }
        .ai-suggestion-text { color: rgba(255, 255, 255, 0.9); line-height: 1.6; font-size: 0.9rem; }

        .result-buttons { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

        .hint-top {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8rem;
            z-index: 10;
        }

        .hint {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8rem;
            z-index: 10;
        }

        .play-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            z-index: 10;
            background: linear-gradient(to top, rgba(10,10,26,0.8), transparent);
        }

        .start-panel, .stats-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .start-panel.hidden, .stats-panel.hidden { display: none; }

        .countdown {
            font-size: 5rem;
            color: #fff;
            animation: pulse 1s ease-in-out infinite;
            text-shadow: 0 0 40px var(--primary);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .stats-title { font-size: 1.5rem; color: #fff; margin-bottom: 1rem; }
        .stats-list { max-height: 300px; overflow-y: auto; margin-bottom: 1rem; }
        .stats-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; color: rgba(255, 255, 255, 0.8); font-size: 0.85rem; }
        .stats-count { background: rgba(102, 126, 234, 0.3); padding: 0.2rem 0.5rem; border-radius: 10px; font-size: 0.75rem; }

        /* 极简主题 */
        body.theme-minimal { background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%); }
        body.theme-minimal .title, body.theme-minimal .timer-display, body.theme-minimal .result-title { color: #e0e1dd; text-shadow: none; }
        body.theme-minimal .btn-secondary, body.theme-minimal .time-btn { border-color: rgba(224, 225, 221, 0.3); color: #e0e1dd; }
        body.theme-minimal .bubble-text, body.theme-minimal .emotion-tag, body.theme-minimal .ai-suggestion-text { color: #e0e1dd; text-shadow: none; }
        body.theme-minimal .hint-top { color: #778da9; }

        @media (max-width: 600px) {
            .title { font-size: 1.6rem; }
            .timer-display { font-size: 2rem; }
            .btn { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
            .time-btn {
                padding: 0.5rem 1rem;
                min-width: 70px;
                font-size: 0.85rem;
            }
            .time-options { gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <div class="start-panel" id="startPanel">
            <h1 class="title">情绪气泡</h1>
            <p style="color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; text-align: center; max-width: 350px; font-size: 0.9rem;">
                戳破气泡，释放情绪<br>让真实的感受浮出水面
            </p>

            <div class="theme-options">
                <div class="theme-btn healing active" data-theme="healing" title="治愈系"></div>
                <div class="theme-btn cyber" data-theme="cyber" title="赛博朋克"></div>
                <div class="theme-btn minimal" data-theme="minimal" title="静谧蓝"></div>
                <div class="theme-btn forest" data-theme="forest" title="森林"></div>
                <div class="theme-btn sunset" data-theme="sunset" title="日落"></div>
            </div>

            <div class="time-options">
                <button class="time-btn active" data-time="60">1分钟</button>
                <button class="time-btn" data-time="180">3分钟</button>
            </div>

            <button class="btn btn-primary" id="startBtn">开始</button>
            <button class="btn btn-secondary btn-small" id="statsBtn" style="margin-top: 1rem;">查看历史</button>
        </div>

        <div class="play-panel" id="playPanel" style="display: none;">
            <p class="hint-top">长按或点击戳破气泡</p>
            <div class="bubble-container" id="bubbleContainer"></div>
            <div class="play-footer">
                <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
                <div class="timer-display" id="timerDisplay">3:00</div>
            </div>
        </div>

        <div class="countdown-panel" id="countdownPanel" style="display: none;">
            <div class="countdown" id="countdownText">3</div>
        </div>

        <div class="stats-panel" id="statsPanel" style="display: none;">
            <h2 class="stats-title">戳破历史</h2>
            <div class="stats-list" id="statsList"></div>
            <button class="btn btn-secondary btn-small" id="clearStatsBtn">清空历史</button>
            <button class="btn btn-primary btn-small" id="backBtn" style="margin-top: 1rem;">返回</button>
        </div>
    </div>

    <div class="result-panel" id="resultPanel">
        <h2 class="result-title">你戳破的情绪</h2>
        <p class="result-subtitle">这些都是你当下最真实的感受</p>
        <div class="emotion-tags" id="emotionTags"></div>
        <div class="ai-suggestion">
            <div class="ai-suggestion-title">✨ 小花的建议</div>
            <div class="ai-suggestion-text" id="aiSuggestion">谢谢你的信任。每一种情绪都值得被看见。记住，情绪没有好坏，它们只是你内心的信使。好好照顾自己。🌸</div>
        </div>
        <div class="result-buttons">
            <button class="btn btn-primary" id="restartBtn">再来一轮</button>
            <button class="btn btn-secondary" id="closeResultBtn">关闭</button>
        </div>
    </div>

        // 音频
        function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        }

        // 背景音效 - 舒缓 ambient 轻音乐
        function startAmbientSound() {
            try {
                stopAmbientSound();
                const ctx = initAudio();

                ambientGain = ctx.createGain();
                ambientGain.gain.setValueAtTime(0.08, ctx.currentTime);
                ambientGain.connect(ctx.destination);

                // 创建柔和的 ambient 和弦 pad
                const baseFreqs = [130.81, 164.81, 196.00, 246.94]; // C3, E3, G3, B3 和弦

                baseFreqs.forEach((freq, i) => {
                    // 主振荡器
                    const osc = ctx.createOscillator();
                    const oscGain = ctx.createGain();

                    // 添加轻微的频率调制（LFO）
                    const lfo = ctx.createOscillator();
                    const lfoGain = ctx.createGain();
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    lfo.frequency.setValueAtTime(0.1 + i * 0.05, ctx.currentTime);
                    lfoGain.gain.setValueAtTime(2 + Math.random() * 2, ctx.currentTime);

                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    oscGain.gain.setValueAtTime(0.15, ctx.currentTime);

                    osc.connect(oscGain);
                    oscGain.connect(ambientGain);

                    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                    lfo.type = 'sine';
                    osc.start(ctx.currentTime);
                    lfo.start(ctx.currentTime);

                    // 添加泛音
                    const harmonic = ctx.createOscillator();
                    const harmGain = ctx.createGain();
                    harmonic.frequency.setValueAtTime(freq * 2, ctx.currentTime);
                    harmonic.type = 'sine';
                    harmGain.gain.setValueAtTime(0.05, ctx.currentTime);
                    harmonic.connect(harmGain);
                    harmGain.connect(ambientGain);
                    harmonic.start(ctx.currentTime);
                });

                // 添加柔和的白噪音作为背景
                const bufferSize = 2 * ctx.sampleRate;
                const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }

                const whiteNoise = ctx.createBufferSource();
                whiteNoise.buffer = noiseBuffer;
                whiteNoise.loop = true;

                // 强低通滤波使噪音变得非常柔和
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 200;

                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.03, ctx.currentTime);

                whiteNoise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(ambientGain);
                whiteNoise.start();
            } catch (e) {}
        }

        function stopAmbientSound() {
            if (ambientGain) {
                try {
                    ambientGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
                } catch (e) {}
                ambientGain = null;
            }
        }

        function playPopSound() {
            try {
                const ctx = initAudio();

                // 随机选择不同的音效风格
                const soundType = Math.floor(Math.random() * 3);

                if (soundType === 0) {
                    // 清脆的"啵"声
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(800 + Math.random() * 400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.type = 'sine';
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.1);
                } else if (soundType === 1) {
                    // 柔和的气泡声
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(400 + Math.random() * 200, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    osc.type = 'triangle';
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.15);
                } else {
                    // 轻微的"噗"声
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(200 + Math.random() * 100, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.25, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    osc.type = 'sine';
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.12);
                }
            } catch (e) {}
        }

        function playEndSound() {
            try {
                const ctx = initAudio();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.5);
                    osc.type = 'sine';
                    osc.start(ctx.currentTime + i * 0.15);
                    osc.stop(ctx.currentTime + i * 0.15 + 0.5);
                });
            } catch (e) {}
        }

                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

        // 物理引擎 - 处理气泡碰撞和边界反弹
        function updatePhysics() {
            const bubbles = Array.from(document.querySelectorAll('.bubble:not(.popping)'));
            const bounds = {
                width: window.innerWidth,
                height: window.innerHeight - 120
            };

            bubbles.forEach(bubble => {
                let x = parseFloat(bubble.style.left);
                let y = parseFloat(bubble.style.top);
                let vx = parseFloat(bubble.dataset.vx) || 0;
                let vy = parseFloat(bubble.dataset.vy) || 0;
                const radius = parseFloat(bubble.dataset.radius) || 40;

                // 更新位置
                x += vx;
                y += vy;

                // 边界反弹
                if (x <= 20 || x >= bounds.width - radius * 2 - 20) {
                    vx *= -0.8;
                    x = Math.max(20, Math.min(x, bounds.width - radius * 2 - 20));
                }
                if (y <= 60 || y >= bounds.height - radius * 2 - 60) {
                    vy *= -0.8;
                    y = Math.max(60, Math.min(y, bounds.height - radius * 2 - 60));
                }

                // 气泡之间碰撞检测和弹开
                bubbles.forEach(other => {
                    if (other === bubble) return;

                    let ox = parseFloat(other.style.left);
                    let oy = parseFloat(other.style.top);
                    const or = parseFloat(other.dataset.radius) || 40;

                    const dx = x - ox;
                    const dy = y - oy;
                    const dist = Math.hypot(dx, dy);
                    const minDist = radius + or;

                    if (dist < minDist && dist > 0) {
                        // 碰撞 - 弹开
                        const overlap = minDist - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;

                        // 分离气泡
                        x += nx * overlap * 0.5;
                        y += ny * overlap * 0.5;

                        // 交换速度（弹性碰撞）
                        const ovx = parseFloat(other.dataset.vx) || 0;
                        const ovy = parseFloat(other.dataset.vy) || 0;
                        bubble.dataset.vx = ovx * 0.8 + (Math.random() - 0.5) * 0.5;
                        bubble.dataset.vy = ovy * 0.8 + (Math.random() - 0.5) * 0.3;
                        other.dataset.vx = vx * 0.8 + (Math.random() - 0.5) * 0.5;
                        other.dataset.vy = vy * 0.8 + (Math.random() - 0.5) * 0.3;
                    }
                });

                // 更新位置
                bubble.style.left = x + 'px';
                bubble.style.top = y + 'px';
                bubble.dataset.vx = vx;
                bubble.dataset.vy = vy;
            });
        }

        function createBubble(specificEmotion = null, parentEmotion = null, depth = 0) {

            const maxY = window.innerHeight - size - 100; // 底部安全边距

            // 防重叠：尝试多次找到不与现有气泡重叠的位置
            let x, y, attempts = 0;

            do {

                const by = parseFloat(b.style.top);
                const bsize = parseFloat(b.style.width) || 80;
                const dist = Math.hypot(x - bx, y - by);
                return dist < (size + bsize) * 0.6; // 保持60%间距
            }));

            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';

            // 物理属性 - 随机初始速度

            // 选择情绪：如果指定了特定情绪则使用，否则随机
            let emotion;

            });

            bubble.addEventListener('mouseleave', () => clearTimeout(longPressTimer));

            // 限制最多10个气泡（已在前面声明）

                    setTimeout(() => {

        function popBubble(bubble, emotion, event) {
            if (bubble.classList.contains('popping')) return;

            const depth = parseInt(bubble.dataset.depth || 0);
            const parentEmotion = bubble.dataset.parentEmotion || '';

            // 获取当前情绪所属类别
            const currentCategory = getEmotionCategory(emotion);

            poppedEmotions.push(emotion);
            bubble.classList.add('popping');
            playPopSound();

            const x = event.clientX || parseFloat(bubble.style.left) + parseFloat(bubble.style.width) / 2;
            const y = event.clientY || parseFloat(bubble.style.top) + parseFloat(bubble.style.height) / 2;
            createParticles(x, y, bubble.style.background);

            // 暂停补充逻辑，避免时序冲突
            let wasSupplementPaused = false;
            if (bubbleTimer) {
                clearInterval(bubbleTimer);
                bubbleTimer = null;
                wasSupplementPaused = true;
            }

            // 根据情绪关系处理其他气泡：对立面消失，相近面保留
            handleEmotionRelations(currentCategory, depth);

            // 检查是否可以挖掘更深层的情绪（最多2层）
            const maxDepth = 2;
            const canDigDeeper = depth < maxDepth && emotionTree[emotion];

            if (canDigDeeper) {
                // 有子情绪，生成细分气泡
                const subEmotions = emotionTree[emotion];
                const count = Math.min(3, subEmotions.length); // 每次生成3个细分情绪

                // 延迟一点生成，让戳破效果先出来
                setTimeout(() => {
                    for (let i = 0; i < count; i++) {
                        setTimeout(() => createBubble(subEmotions[i], emotion, depth + 1), i * 200);
                    }
                }, 300);
            }
            // 没有子情绪了，不做处理

            setTimeout(() => {
                // 获取被戳破气泡的位置信息
                const poppedX = parseFloat(bubble.style.left);
                const poppedY = parseFloat(bubble.style.top);
                const size = parseFloat(bubble.style.width) || 55;

                bubble.remove();

                // 立即补充新气泡（在戳破位置附近）
                if (isPlaying) {
                    // 随机选择情绪（优先选择相近类别）
                    const similar = similarCategories[currentCategory] || [];
                    const categories = [currentCategory, ...similar].filter(c => c);
                    const randomCat = categories[Math.floor(Math.random() * categories.length)];
                    let newEmotion;
                    if (emotionTree[randomCat] && Math.random() > 0.3) {
                        const subs = emotionTree[randomCat];
                        newEmotion = subs[Math.floor(Math.random() * subs.length)];
                    } else {
                        newEmotion = emotions[Math.floor(Math.random() * emotions.length)];
                    }

                    // 在戳破位置附近生成新气泡（带偏移避免完全重叠）
                    createBubbleNear(newEmotion, poppedX, poppedY, size);
                }

                // 恢复补充逻辑（保底）
                if (wasSupplementPaused && isPlaying) {
                    bubbleTimer = setInterval(() => {
                        const count = document.querySelectorAll('.bubble:not(.popping)').length;
                        if (count < 10) createBubble();
                    }, 2000);
                }
            }, 300);
        }

        // 在指定位置附近创建气泡
        function createBubbleNear(emotion, nearX, nearY, nearSize) {
            const size = Math.random() * 50 + 55;
            const bubble = document.createElement('div');

            bubble.style.opacity = '0';

            bubble.innerHTML = `<span class="bubble-text">${emotion}</span>`;

            // 事件
            bubble.addEventListener('click', (e) => popBubble(bubble, emotion, e));

        // 处理情绪关系：对立面渐隐消失，相近面保留并补充
        function handleEmotionRelations(category, currentDepth) {
            const opposite = oppositeCategories[category] || [];
            const similar = similarCategories[category] || [];

            const bubbles = document.querySelectorAll('.bubble:not(.popping)');
            bubbles.forEach(b => {
                const depth = parseInt(b.dataset.depth || 0);
                const text = b.textContent;
                const cat = getEmotionCategory(text);

                // 对立面：渐隐消失
                if (opposite.includes(cat)) {
                    b.style.transition = 'opacity 1.5s ease-out, transform 1.5s ease-out';
                    b.style.opacity = '0';
                    b.style.transform = 'scale(0.3)';
                    setTimeout(() => b.remove(), 1500);
                }
                // 其他类别（没有在对立列表）：保留
            });

            // 补充相近类别的气泡（只在同类和相近类别中补充）
            if (similar.length > 0) {
                setTimeout(() => {
                    const targetCategories = [category, ...similar].slice(0, 3); // 最多补充3个类别
                    targetCategories.forEach(cat => {
                        if (emotionTree[cat] && Math.random() > 0.4) {
                            const subEmotions = emotionTree[cat];
                            const randomSub = subEmotions[Math.floor(Math.random() * subEmotions.length)];
                            createBubble(randomSub, cat, 0);
                        }
                    });
                }, 1000);
            }
        }

        // 获取情绪大类
        function getEmotionCategory(emotion) {
            for (const [key, values] of Object.entries(emotionTree)) {
                if (values.includes(emotion) || key === emotion) return key;
            }
            return 'default';
        }

        function getEmotionCategory(emotion) {
            for (const [category, keywords] of Object.entries(emotionCategoryMap)) {
                for (const keyword of keywords) {
                    if (emotion.includes(keyword)) return category;
                }
            }
            return null;
        }

        function getRandomSuggestion(category) {
            const templates = aiSuggestionTemplates[category] || aiSuggestionTemplates.default;
            return templates[Math.floor(Math.random() * templates.length)];
        }

        function generateAISuggestion(emotions) {
            const suggestions = [];
            const usedCategories = new Set();

            // 遍历用户戳破的情绪，匹配对应的建议类别
            for (const emotion of emotions) {
                const category = getEmotionCategory(emotion);
                if (category && !usedCategories.has(category)) {
                    suggestions.push(getRandomSuggestion(category));
                    usedCategories.add(category);
                }
            }

            // 如果没有匹配到任何类别，使用默认建议
            if (suggestions.length === 0) {
                suggestions.push(getRandomSuggestion('default'));
            }

            // 限制建议数量，最多4条
            const finalSuggestions = suggestions.slice(0, 4);

            // 如果只有一条，加上通用的鼓励
            if (finalSuggestions.length === 1) {
                finalSuggestions.push(getRandomSuggestion('default'));
            }

            aiSuggestion.textContent = finalSuggestions.join('\n\n');
        }

        function saveHistory() {
            const today = new Date().toLocaleDateString();
            const counts = {};
            poppedEmotions.forEach(e => counts[e] = (counts[e] || 0) + 1);

            const existing = history.findIndex(h => h.date === today);
            if (existing >= 0) {
                Object.entries(counts).forEach(([e, c]) => {
                    history[existing].emotions[e] = (history[existing].emotions[e] || 0) + c;
                });
            } else {
                history.push({ date: today, emotions: counts });
            }
            history = history.slice(-30);
            localStorage.setItem('emotionBubbleHistory', JSON.stringify(history));
        }

        function showStats() {
            const statsList = document.getElementById('statsList');

            if (history.length === 0) {
                statsList.innerHTML = '<p style="color: rgba(255,255,255,0.5); text-align: center;">暂无历史记录</p>';
                return;
            }

            const allEmotions = {};
            history.forEach(h => {
                Object.entries(h.emotions).forEach(([e, c]) => {
                    allEmotions[e] = (allEmotions[e] || 0) + c;
                });
            });

            const sorted = Object.entries(allEmotions).sort((a, b) => b[1] - a[1]).slice(0, 20);
            statsList.innerHTML = sorted.map(([e, c]) =>
                `<div class="stats-item"><span>${e}</span><span class="stats-count">${c}</span></div>`
            ).join('');
        }

                history = [];
                localStorage.setItem('emotionBubbleHistory', '[]');

            }
