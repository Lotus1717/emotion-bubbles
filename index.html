<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="情绪气泡 - 戳破气泡，释放情绪，让真实的感受浮出水面">
    <meta name="theme-color" content="#0a0a1a">
    <title>情绪气泡 - 释放你的情绪</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 背景效果 -->
    <div class="stars" id="stars"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- 主容器 -->
    <div class="container">
        
        <!-- 开始面板 -->
        <div class="start-panel" id="startPanel">
            <h1 class="title">情绪气泡</h1>
            <p class="subtitle">
                戳破气泡，释放情绪<br>让真实的感受浮出水面
            </p>

            <!-- 主题选择 -->
            <div class="theme-options">
                <div class="theme-btn healing active" data-theme="healing" title="治愈系"></div>
                <div class="theme-btn forest" data-theme="forest" title="森林"></div>
                <div class="theme-btn sunset" data-theme="sunset" title="日落"></div>
            </div>

            <!-- 时间选择 -->
            <div class="time-options">
                <button class="time-btn active" data-time="60">1分钟</button>
                <button class="time-btn" data-time="180">3分钟</button>
            </div>

            <!-- 按钮组 -->
            <button class="btn btn-primary" id="startBtn">开始</button>
            <button class="btn btn-secondary btn-small" id="statsBtn" style="margin-top: 1rem;">查看历史</button>
        </div>

        <!-- 游戏面板 -->
        <div class="play-panel" id="playPanel">
            <p class="hint-top">长按或点击戳破气泡</p>
            <div class="bubble-container" id="bubbleContainer"></div>
            <div class="play-footer">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="timer-display" id="timerDisplay">1:00</div>
            </div>
        </div>

        <!-- 倒计时面板 -->
        <div class="countdown-panel" id="countdownPanel">
            <div class="countdown" id="countdownText">3</div>
        </div>

        <!-- 统计面板 -->
        <div class="stats-panel" id="statsPanel">
            <h2 class="stats-title">戳破历史</h2>
            <div class="stats-list" id="statsList"></div>
            <button class="btn btn-secondary btn-small" id="clearStatsBtn">清空历史</button>
            <button class="btn btn-primary btn-small" id="backBtn" style="margin-top: 1rem;">返回</button>
        </div>
    </div>

    <!-- 结果面板 -->
    <div class="result-panel" id="resultPanel">
        <h2 class="result-title">你戳破的情绪</h2>
        <p class="result-subtitle">这些都是你当下最真实的感受</p>
        <div class="emotion-tags" id="emotionTags"></div>
        <div class="ai-suggestion">
            <div class="ai-suggestion-title">✨ 小花的建议</div>
            <div class="ai-suggestion-text" id="aiSuggestion">
                谢谢你的信任。每一种情绪都值得被看见。记住，情绪没有好坏，它们只是你内心的信使。好好照顾自己。🌸
            </div>
        </div>
        <div class="result-buttons">
            <button class="btn btn-primary" id="restartBtn">再来一轮</button>
            <button class="btn btn-secondary" id="closeResultBtn">关闭</button>
        </div>
    </div>

    <!-- 加载 ES6 模块 -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
